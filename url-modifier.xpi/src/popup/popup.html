<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>URL Modifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3350;
      --accent:    #4f8ef7;
      --grn:       #4ff7a0;
      --red:       #f74f6a;
      --text:      #e8eaf6;
      --dim:       #8890b0;
      --mono:      'Courier New', monospace;
      --ui:        system-ui, sans-serif;
      --r:         6px;
    }

    body {
      width: 620px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--ui);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      max-height: 580px;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 13px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 26px; height: 26px;
      background: var(--accent);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    header h1 { font-size: 13px; font-weight: 700; flex: 1; }

    .toggle-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      font-size: 12px; font-weight: 600;
      cursor: pointer; user-select: none;
    }
    .toggle-pill.on  { border-color: var(--grn); color: var(--grn); background: #182a20; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); }
    .toggle-pill.on .dot { background: var(--grn); box-shadow: 0 0 5px var(--grn); }

    /* Toolbar */
    .toolbar {
      display: flex; gap: 5px; padding: 7px 13px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .btn {
      display: flex; align-items: center; gap: 4px;
      padding: 5px 9px; border-radius: 4px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text); font-size: 12px; font-weight: 500;
      cursor: pointer;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { filter: brightness(1.1); }
    .sp { flex: 1; }

    /* Column headers */
    .col-hdr {
      display: grid;
      grid-template-columns: 120px 1fr 1fr 96px 26px;
      gap: 5px; padding: 5px 13px 3px;
      flex-shrink: 0;
    }
    .col-hdr span {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--dim);
    }

    /* Rules list */
    #rules-list {
      flex: 1; overflow-y: auto;
      padding: 4px 13px 8px;
      min-height: 60px;
    }

    .rule-row {
      display: grid;
      grid-template-columns: 120px 1fr 1fr 96px 26px;
      gap: 5px; align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .rule-row:last-child { border-bottom: none; }

    .rule-row input[type=text] {
      width: 100%; padding: 4px 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 3px; color: var(--text);
      font-family: var(--mono); font-size: 11px; outline: none;
    }
    .rule-row input[type=text].name-f { font-family: var(--ui); }
    .rule-row input[type=text]:focus  { border-color: var(--accent); }
    .rule-row input.bad { border-color: var(--red) !important; }

    /* Mode radio */
    .mode-wrap { display: flex; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
    .mode-wrap input { display: none; }
    .mode-wrap label {
      flex: 1; text-align: center; padding: 4px 2px;
      font-size: 10px; font-weight: 600;
      color: var(--dim); background: var(--surface2);
      cursor: pointer; user-select: none;
    }
    .mode-wrap input:checked + label { background: var(--accent); color: #fff; }

    /* Delete btn */
    .del-btn {
      width: 24px; height: 24px; border-radius: 3px;
      border: 1px solid transparent; background: none;
      color: var(--dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .del-btn:hover { border-color: var(--red); color: var(--red); background: #2a1520; }

    /* Empty */
    .empty {
      padding: 24px; text-align: center; color: var(--dim); font-size: 12px;
    }

    /* Test bar */
    .test-wrap {
      flex-shrink: 0; border-top: 1px solid var(--border);
      background: var(--surface2);
    }
    .test-row {
      display: flex; align-items: center; gap: 6px; padding: 6px 13px;
    }
    .test-row label { font-size: 11px; color: var(--dim); white-space: nowrap; }
    .test-row input {
      flex: 1; padding: 4px 7px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 3px; color: var(--text);
      font-family: var(--mono); font-size: 11px; outline: none;
    }
    .test-row input:focus { border-color: var(--accent); }
    #test-out {
      padding: 0 13px 6px; font-family: var(--mono); font-size: 11px;
      color: var(--grn); word-break: break-all; min-height: 16px;
    }
    #test-out.same  { color: var(--dim); }
    #test-out.err   { color: var(--red); }

    /* Footer */
    footer {
      display: flex; align-items: center; padding: 6px 13px;
      background: var(--surface); border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #rule-count { font-size: 11px; color: var(--dim); flex: 1; }
    .opt-link {
      font-size: 11px; color: var(--accent);
      background: none; border: none; cursor: pointer; font-family: var(--ui);
    }

    input[type=file] { display: none; }

    /* Toast */
    #toast {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--accent);
      color: var(--text); font-size: 12px; padding: 6px 16px;
      border-radius: 20px; pointer-events: none; opacity: 0;
      transition: opacity .2s; white-space: nowrap; z-index: 99;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <div class="logo">↝</div>
  <h1>URL Modifier</h1>
  <div class="toggle-pill" id="toggleBtn">
    <div class="dot"></div>
    <span id="statusTxt">Inactive</span>
  </div>
</header>

<div class="toolbar">
  <button class="btn primary" id="btnAdd">+ Add Rule</button>
  <div class="sp"></div>
  <button class="btn" id="btnImport">↓ Import</button>
  <button class="btn" id="btnExport">↑ Export</button>
</div>

<div class="col-hdr">
  <span>Name</span>
  <span>Pattern (regex)</span>
  <span>Modification</span>
  <span>Mode</span>
  <span></span>
</div>

<div id="rules-list"></div>

<div class="test-wrap">
  <div class="test-row">
    <label>Test URL:</label>
    <input type="text" id="test-in" placeholder="https://example.com/path?foo=1" />
  </div>
  <div id="test-out" class="same">—</div>
</div>

<footer>
  <span id="rule-count">0 rules</span>
  <button class="opt-link" id="btnOptions">Full editor ↗</button>
</footer>

<input type="file" id="file-input" accept=".json,application/json" />
<div id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
